# Core 기본 Rubric
# Company Instance는 이 Rubric을 상속해 확장한다.

id: default-rubric
version: "1.0"
description: "모든 프로젝트에 적용되는 기본 평가 기준"

dimensions:
  - id: objective-achievement
    weight: 0.30
    description: "목표 달성도 — completionCriteria 충족"
  - id: source-traceability
    weight: 0.25
    description: "출처 추적 가능성 — 주요 사실에 Source 연결"
  - id: factual-accuracy
    weight: 0.20
    description: "사실 정확성"
  - id: completeness
    weight: 0.15
    description: "완전성 — 누락 없음"
  - id: reusability
    weight: 0.10
    description: "재사용 가능성"

verdicts:
  pass:
    min_score: 75
  revise:
    score_range: "50-74"
  fail:
    max_score: 49

principles:
  - "Evaluator는 Executor와 독립되어야 한다."
  - "실패와 불완전성을 명확히 기록한다."
  - "출처 없는 주장은 warning으로 표시한다."
